<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSAP SVG</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0e100f;
        overflow: hidden;
      }

      .btn {
        padding: 10px;
        padding-left: 15px;
        padding-right: 15px;
        background-color: rgb(25, 92, 179);
        color: white;
        border: none;
        outline: none;
        border-radius: 7px;
        cursor: pointer;
      }

      .btn-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .container {
        position: relative;
        width: 90vw;
        height: 90vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-evenly;
        border-radius: 9px;
      }

      #svg-stage {
        width: 60%;
        max-height: 60vh;
        max-width: 500px;
        overflow: visible;
      }

      #gradient {
        height: 0;
      }
    </style>

    <script src="./svg-index.js" type="module" defer></script>
  </head>
  <body>
    <div class="btn-wrapper">
      <!-- <button class="btn" id="btn-start">Start</button> -->
      <button class="btn" id="btn-play">Play</button>
      <button class="btn" id="btn-reverse">Reverse</button>
      <button class="btn" id="btn-pause">Pause</button>
      <button class="btn" id="btn-resume">Resume</button>
      <button class="btn" id="btn-seek">Seek</button>
    </div>
    <div class="container">
      <!-- <svg
        id="svg-stage"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 100 100"
        fill="none"
      >
        <path id="diamond" fill="url(#grad)" d="M50,1l49,49L50,99L1,50L50,1z" />
        <path
          id="lightning"
          fill="transparent"
          d="M47.1,0.8 73.3,0.8 61.9,37.2 77.1,37.2 30.7,99.4 45.8,51.9 29,51.9z"
        />

        <path
          id="facebook"
          fill="#444"
          d="M7.2 16V8.5h-2V5.8h2V3.5C7.2 1.7 8.4 0 11.1 0c1.1 0 1.9.1 1.9.1l-.1 2.5h-1.7c-1 0-1.1.4-1.1 1.2v2H13l-.1 2.7h-2.8V16z"
        />
      </svg> -->

      <svg
        id="svg-stage"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 100 100"
        fill="none"
      >
        <path id="diamond" fill="url(#grad)" d="M50,1l49,49L50,99L1,50L50,1z" />

        <path
          id="lightning"
          fill="transparent"
          d="M47.1,0.8 73.3,0.8 61.9,37.2 77.1,37.2 30.7,99.4 45.8,51.9 29,51.9z"
        />

        <path
          id="facebook"
          fill="transparent"
          d="M60.8,84 V54 h-8 v-11.2 h8 v-9.2 c0,-7.2 4.8,-14 15.6,-14 c4.4,0 7.6,0.4 7.6,0.4 l-0.4,10 h-6.8 c-4,0 -4.4,1.6 -4.4,4.8 v8 h11.2 l-0.4,10.8 h-10.8 V84 z"
        />
      </svg>

      <svg
        id="gradient"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 100 100"
        fill="none"
      >
        <defs>
          <linearGradient
            id="grad"
            x1="0"
            y1="0"
            x2="99"
            y2="99"
            gradientUnits="userSpaceOnUse"
          >
            <stop offset="0.2" stop-color="rgb(255, 135, 9)" />
            <stop offset="0.7" stop-color="rgb(247, 189, 248)" />
          </linearGradient>
        </defs>
      </svg>
    </div>
  </body>
</html>
